<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0%" stop-color="#3BA8EF"/>
      <stop offset="100%" stop-color="#1A6FA0"/>
    </radialGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Telegram-style rounded square background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Ring of captcha colors (halo around the head) -->
  <g stroke="#FFFFFF" stroke-width="4">
    <circle cx="256" cy="92"  r="20" fill="#EF4444"/>
    <circle cx="134" cy="144" r="20" fill="#22C55E"/>
    <circle cx="84"  cy="256" r="20" fill="#FACC15"/>
    <circle cx="134" cy="368" r="20" fill="#A855F7"/>
    <circle cx="378" cy="368" r="20" fill="#F97316"/>
    <circle cx="428" cy="256" r="20" fill="#3B82F6"/>
  </g>

  <!-- Antenna -->
  <line x1="256" y1="174" x2="256" y2="140" stroke="#1E293B" stroke-width="7" stroke-linecap="round"/>
  <circle cx="256" cy="128" r="13" fill="#EF4444" stroke="#1E293B" stroke-width="4"/>
  <!-- antenna sparkle to imply "detecting" -->
  <g stroke="#FDE68A" stroke-width="3" stroke-linecap="round">
    <line x1="245" y1="112" x2="238" y2="105"/>
    <line x1="267" y1="112" x2="274" y2="105"/>
    <line x1="256" y1="108" x2="256" y2="100"/>
  </g>

  <!-- Bot head -->
  <rect x="146" y="178" width="220" height="214" rx="42"
        fill="url(#head)" stroke="#1E293B" stroke-width="9"
        filter="url(#shadow)"/>

  <!-- Side speakers / ears -->
  <rect x="128" y="234" width="18" height="64" rx="9" fill="#475569" stroke="#1E293B" stroke-width="4"/>
  <rect x="366" y="234" width="18" height="64" rx="9" fill="#475569" stroke="#1E293B" stroke-width="4"/>

  <!-- Visor frame (darker band behind eyes) -->
  <rect x="168" y="228" width="176" height="64" rx="18" fill="#1E293B"/>

  <!-- Eyes: squinty/suspicious "watching you" look -->
  <g fill="#22D3EE">
    <rect x="196" y="252" width="48" height="14" rx="7"/>
    <rect x="268" y="252" width="48" height="14" rx="7"/>
  </g>
  <!-- Tiny highlights to keep it friendly -->
  <circle cx="210" cy="258" r="3" fill="#FFFFFF"/>
  <circle cx="282" cy="258" r="3" fill="#FFFFFF"/>

  <!-- Smirk -->
  <path d="M 206 332 Q 256 364 306 332"
        stroke="#1E293B" stroke-width="8" fill="none"
        stroke-linecap="round"/>

  <!-- "No spam" prohibition badge, tilted -->
  <g transform="translate(398, 192) rotate(22)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="46" fill="#EF4444" stroke="#FFFFFF" stroke-width="5"/>
    <rect x="-32" y="-7" width="64" height="14" rx="3" fill="#FFFFFF"/>
  </g>
</svg>
