services:
  bot:
    build: .
    image: menand-antispam:latest
    container_name: menand-antispam
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/bot.db
    volumes:
      - bot-data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
