name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - run: go mod download
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./...
